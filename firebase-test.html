<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Connection Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-result {
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            border-left: 4px solid;
        }
        .success {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }
        .warning {
            background: #fff3cd;
            border-color: #ffc107;
            color: #856404;
        }
        .info {
            background: #d1ecf1;
            border-color: #17a2b8;
            color: #0c5460;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
        #results {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>🔥 Firebase Connection Test</h1>
    <p>This page will test your Firebase configuration and connection.</p>
    
    <button onclick="runTests()">Run Tests</button>
    
    <div id="results"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    
    <script>
        function addResult(message, type) {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.innerHTML = message;
            document.getElementById('results').appendChild(div);
        }
        
        async function runTests() {
            const results = document.getElementById('results');
            results.innerHTML = '<h2>Running Tests...</h2>';
            
            // Test 1: Firebase SDK loaded
            if (typeof firebase !== 'undefined') {
                addResult('✅ Firebase SDK loaded successfully', 'success');
            } else {
                addResult('❌ Firebase SDK not loaded! Check internet connection.', 'error');
                return;
            }
            
            // Test 2: Firebase initialized
            if (typeof database !== 'undefined' && database !== null) {
                addResult('✅ Firebase initialized', 'success');
            } else {
                addResult('❌ Firebase not initialized! Check firebase-config.js', 'error');
                return;
            }
            
            // Test 3: Firebase config
            addResult(`📋 Database URL: ${firebaseConfig.databaseURL}`, 'info');
            addResult(`📋 Project ID: ${firebaseConfig.projectId}`, 'info');
            
            // Test 4: Connection test
            try {
                addResult('🔄 Testing database connection...', 'info');
                const connectedRef = database.ref('.info/connected');
                const snapshot = await connectedRef.once('value');
                const connected = snapshot.val();
                
                if (connected) {
                    addResult('✅ Connected to Firebase Realtime Database!', 'success');
                } else {
                    addResult('⚠️ Not connected to Firebase', 'warning');
                }
            } catch (error) {
                addResult(`❌ Connection test failed: ${error.message}`, 'error');
            }
            
            // Test 5: Write test
            try {
                addResult('🔄 Testing write permissions...', 'info');
                const testRef = database.ref('test_connection');
                await testRef.set({
                    timestamp: new Date().toISOString(),
                    message: 'Test write successful'
                });
                addResult('✅ Write test successful!', 'success');
            } catch (error) {
                addResult(`❌ Write test failed: ${error.message}`, 'error');
                addResult('⚠️ Check Firebase database rules!', 'warning');
            }
            
            // Test 6: Read test
            try {
                addResult('🔄 Testing read permissions...', 'info');
                const testRef = database.ref('test_connection');
                const snapshot = await testRef.once('value');
                const data = snapshot.val();
                
                if (data) {
                    addResult('✅ Read test successful!', 'success');
                    addResult(`📋 Read data: ${JSON.stringify(data)}`, 'info');
                } else {
                    addResult('⚠️ No data found (this is okay for first run)', 'warning');
                }
            } catch (error) {
                addResult(`❌ Read test failed: ${error.message}`, 'error');
            }
            
            addResult('<br><strong>✅ All tests completed!</strong>', 'success');
        }
    </script>
</body>
</html>
