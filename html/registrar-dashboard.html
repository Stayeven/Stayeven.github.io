<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Dashboard</title>
    <link rel="stylesheet" href="../css/registrar-dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <header>
            <img src="../assets/logo.jpeg" alt="Logo" class="header-logo">
            <h1>Registrar Dashboard</h1>
            <div class="header-actions">
                <button onclick="showNotifications()" class="notification-btn">
                    🔔
                    <span id="notificationBadge" class="notification-badge" style="display: none;">0</span>
                </button>
                <button onclick="logout()" class="logout-btn">Logout</button>
            </div>
        </header>
        
        <div class="main-container">
            <h2>Sections</h2>
            
            <div class="sections-list" id="sectionsList">
                <!-- Sections will be populated here -->
            </div>
        </div>

        <!-- Notifications Modal -->
        <div id="notificationsModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Notifications</h2>
                    <button onclick="closeNotifications()" class="close-btn">✕</button>
                </div>
                <div class="modal-actions">
                    <button onclick="markAllAsRead()" class="action-btn">Mark All as Read</button>
                    <button onclick="clearAllNotifications()" class="action-btn danger">Clear All</button>
                </div>
                <div id="notificationsList" class="notifications-list">
                    <!-- Notifications will be populated here -->
                </div>
            </div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/registrar-dashboard.js"></script>
</body>
</html>
