<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Section View - Registrar</title>
    <link rel="stylesheet" href="../css/registrar-section-view.css">
</head>
<body>
    <div class="dashboard-container">
        <header>
            <div class="header-left">
                <button onclick="goBack()" class="back-btn-header">←</button>
                <div class="section-info">
                    <h1 id="sectionTitle">Grade 12 - STEM - St. Margaret</h1>
                    <p id="sectionSubtitle">Failing Students</p>
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <select id="quarterFilter" onchange="filterByQuarter()" style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px;">
                    <option value="all">All Quarters</option>
                    <option value="1">1st Quarter</option>
                    <option value="2">2nd Quarter</option>
                    <option value="3">3rd Quarter</option>
                    <option value="4">4th Quarter</option>
                </select>
                <button onclick="logout()" class="logout-btn">Logout</button>
            </div>
        </header>
        
        <div class="main-container">
            <div class="table-container">
                <table class="students-table">
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Subject</th>
                            <th>Quarter</th>
                            <th>Average</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="studentsTable">
                        <!-- Students will be populated here -->
                    </tbody>
                </table>
                <div id="noFailingStudents" style="display: none; text-align: center; padding: 40px; color: #666;">
                    <div style="font-size: 48px; margin-bottom: 20px;">✓</div>
                    <h3>No Failing Students</h3>
                    <p>All students in this section are passing!</p>
                </div>
            </div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/registrar-section-view.js"></script>
</body>
</html>
