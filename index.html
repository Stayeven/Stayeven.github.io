<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <img src="assets/logo.jpeg" alt="Logo" class="logo">
            <h1>Welcome Back</h1>
            <form id="loginForm">
                <div class="role-selection">
                    <div class="role-option" onclick="selectRole('teacher')">
                        <input type="radio" id="teacher" name="role" value="teacher" required>
                        <label for="teacher">Teacher</label>
                    </div>
                    <div class="role-option" onclick="selectRole('registrar')">
                        <input type="radio" id="registrar" name="role" value="registrar" required>
                        <label for="registrar">Registrar</label>
                    </div>
                </div>
                <div class="input-group">
                    <label for="username">Email</label>
                    <input type="email" id="username" name="username" required placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
